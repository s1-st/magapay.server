<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<input id="search" placeholder="Email or Phone">
<button onclick="searchUser()">Search</button>

<div id="user" style="margin-top:10px;"></div>

<hr>

<input id="amount" placeholder="Amount">
<br><br>

<button onclick="add()">Add Balance</button>
<button onclick="deduct()">Deduct Balance</button>

<hr>
  <button onclick="allowWithdraw()">
Allow Withdraw (Skip Referral Rule)
</button>

<p id="result"></p>
<input id="profitAmount" placeholder="Profit amount">
<br><br>

<button onclick="addProfit()">Add Profit</button>
<button onclick="deductProfit()">Deduct Profit</button>
  
<script>

const API = "https://magapay-server.onrender.com";
const ADMIN_KEY = "SWAT2121@2026";

let selectedEmail = "";

const headers = {
  "Content-Type": "application/json",
  "x-admin-key": ADMIN_KEY
};

async function searchUser() {
  try {
    const search = document.getElementById("search").value;

    const res = await fetch(API + "/admin/user?search=" + search, {
      headers
    });

    const data = await res.json();

    selectedEmail = data.email;

    document.getElementById("user").innerHTML =
      `
      <b>Name:</b> ${data.name}<br>
      <b>Phone:</b> ${data.phone}<br>
      <b>Email:</b> ${data.email}<br>
      <b>Balance:</b> ${data.balance}
      `;

  } catch (err) {
    console.log(err);
    alert("User not found");
  }
}

async function add() {

  console.log("Sending request to admin adjust balance...");

  const amount = Number(document.getElementById("amount").value);

  if (!selectedEmail) return alert("Search user first");

  const res = await fetch(API + "/admin/adjust-balance", {
    method: "POST",
    headers: headers,
    body: JSON.stringify({
      email: selectedEmail,
      amount: amount
    })
  });

  const data = await res.json();
  console.log(data);

  alert("Balance added successfully");
}

async function deduct() {

  console.log("Sending request to admin adjust balance...");

  const amount = Number(document.getElementById("amount").value);

  if (!selectedEmail) return alert("Search user first");

  const res = await fetch(API + "/admin/adjust-balance", {
    method: "POST",
    headers: headers,
    body: JSON.stringify({
      email: selectedEmail,
      amount: -amount
    })
  });

  const data = await res.json();
  console.log(data);

  alert("Balance deducted successfully");
}
async function adjustProfit(amount) {

if (!selectedEmail)
return alert("Search user first");

const res =
await fetch(
API + "/admin/adjust-profit",
{
method:"POST",

headers: headers,

body: JSON.stringify({
email: selectedEmail,
amount: amount
})
}
);

const data =
await res.json();

console.log(data);

alert("Profit updated");

}

async function addProfit() {

const amount =
Number(
document
.getElementById(
"profitAmount"
).value
);

await adjustProfit(amount);

}

async function deductProfit() {

const amount =
Number(
document
.getElementById(
"profitAmount"
).value
);

await adjustProfit(-amount);

}
</script>

</body>
</html>

<h3>Withdrawals</h3>
<div id="withdrawals"></div>

<h4>📊 Withdrawal Analytics (Today)</h4>

<div id="analytics" style="border:1px solid #ccc;padding:10px;margin-bottom:10px;">
Loading...
</div>

<script>
async function loadWithdrawals() {

const res = await fetch(API + "/admin/withdrawals", {
headers: {
"x-admin-key": ADMIN_KEY
}
});

const data = await res.json();

document.getElementById("withdrawals").innerHTML =
data.map(tx => `
  <div style="border:1px solid #ccc;padding:10px;margin:5px;">
    <b>${tx.msisdn}</b><br>
    Amount: ${tx.amount}<br>
    Status: ${tx.status}<br>
    Ref: ${tx.reference}<br>

 ${tx.status === "PENDING" ? `
  <button onclick="approve('${tx.reference}')">
    Approve
  </button>

  <button style="background:red;color:white;" onclick="reject('${tx.reference}')">
    Reject
  </button>
` : ""}
  </div>
`).join("");

}

async function approve(ref) {

await fetch(API + "/admin/approve-withdrawal", {
method: "POST",
headers: {
"Content-Type": "application/json",
"x-admin-key": ADMIN_KEY
},
body: JSON.stringify({ reference: ref })
});

alert("Approved");

loadWithdrawals();

}

loadWithdrawals();

  async function reject(ref) {

const res = await fetch(API + "/admin/reject-withdrawal", {
method: "POST",
headers: {
"Content-Type": "application/json",
"x-admin-key": ADMIN_KEY
},
body: JSON.stringify({ reference: ref })
});

const data = await res.json();

alert(data.message);

loadWithdrawals();

}
</script>
<script>

async function allowWithdraw(){

const email =
document.getElementById("search").value;

const res =
await fetch(
"/admin/allow-withdraw",
{
method:"POST",

headers:{
"Content-Type":"application/json",
"x-admin-key":"YOUR_ADMIN_KEY"
},

body:JSON.stringify({
email
})

});

const data =
await res.json();

document.getElementById(
"result"
).innerText =
data.message ||
data.error;

}

</script>
